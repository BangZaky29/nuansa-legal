name: Deploy Website to cPanel (Rumah Web)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔨 Install dependencies & Build
        run: |
          npm install
          CI=false npm run build

      - name: 📂 Deploy via SFTP (sshpass + lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Install lftp
          sudo apt-get install -y lftp

          # Deploy semua file dari dist/ ke public_html/ di server
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://$FTP_SERVER <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose \
            --exclude=".git*" \
            ./dist/ /home/$FTP_USERNAME/public_html/
          bye
          EOF