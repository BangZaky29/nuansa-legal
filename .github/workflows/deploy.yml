name: Deploy Website to cPanel

on:
  push:
    branches:
      - main  # Ganti 'master' jika branch utama kamu namanya master

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Sesuaikan dengan versi node kamu

      - name: 🔨 Install dependencies & Build
        run: |
          npm install
          npm run build

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./ 
          port: 21            # Tambahkan port secara eksplisit
          protocol: ftp       # Coba paksa gunakan ftp biasa (lebih stabil untuk beberapa cPanel)
          timeout: 60000      # Tambahkan timeout agar tidak cepat putus
